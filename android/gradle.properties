org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Kotlin's relocatable incremental caches break when plugin sources (pub cache on
# C:) and the project (E:) sit on different drives — "this and base files have
# different roots". Disabling incremental Kotlin compilation avoids the noisy
# cache-close failures at the cost of slightly slower builds.
kotlin.incremental=false
